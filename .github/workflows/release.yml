name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # Required for actions/attest-build-provenance to sign attestations
  # via the workflow's OIDC identity and write them to the release.
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agent-analyzer
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: agent-analyzer
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: agent-analyzer
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-analyzer
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-analyzer.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          save-if: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Build agent-analyzer
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p analyzer-cli

      - name: Build agent-analyzer (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p analyzer-cli

      - name: Build agent-analyzer-embed
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p analyzer-embed

      - name: Build agent-analyzer-embed (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p analyzer-embed

      - name: Resolve embed binary name
        id: embed_artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "name=agent-analyzer-embed.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=agent-analyzer-embed" >> "$GITHUB_OUTPUT"
          fi

      - name: Create archives (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          cd target/${{ matrix.target }}/release
          tar czvf ../../../agent-analyzer-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          tar czvf ../../../agent-analyzer-embed-${{ matrix.target }}.tar.gz ${{ steps.embed_artifact.outputs.name }}
          cd ../../..
          shasum -a 256 agent-analyzer-${{ matrix.target }}.tar.gz > agent-analyzer-${{ matrix.target }}.tar.gz.sha256
          shasum -a 256 agent-analyzer-embed-${{ matrix.target }}.tar.gz > agent-analyzer-embed-${{ matrix.target }}.tar.gz.sha256

      - name: Create archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../agent-analyzer-${{ matrix.target }}.zip
          Compress-Archive -Path ${{ steps.embed_artifact.outputs.name }} -DestinationPath ../../../agent-analyzer-embed-${{ matrix.target }}.zip
          cd ../../..
          (Get-FileHash agent-analyzer-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower() + "  agent-analyzer-${{ matrix.target }}.zip" | Out-File -Encoding ASCII agent-analyzer-${{ matrix.target }}.zip.sha256
          (Get-FileHash agent-analyzer-embed-${{ matrix.target }}.zip -Algorithm SHA256).Hash.ToLower() + "  agent-analyzer-embed-${{ matrix.target }}.zip" | Out-File -Encoding ASCII agent-analyzer-embed-${{ matrix.target }}.zip.sha256

      # SLSA build-provenance attestations. These are uploaded as separate
      # .intoto.jsonl files alongside the tarballs so downloaders *can*
      # verify with cosign / slsa-verifier, but the agent-core downloader
      # does not yet consume them - this is defense-in-depth at publish
      # time, client-side verification is a follow-up.
      - name: Attest release artifacts (Unix)
        if: runner.os != 'Windows'
        # Pin to SHA to prevent a malicious tag reassignment from silently
        # replacing the attestation step. Bump via Dependabot.
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd
        with:
          subject-path: |
            agent-analyzer-${{ matrix.target }}.tar.gz
            agent-analyzer-embed-${{ matrix.target }}.tar.gz

      - name: Attest release artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@db473fddc028af60658334401dc6fa3ffd8669fd
        with:
          subject-path: |
            agent-analyzer-${{ matrix.target }}.zip
            agent-analyzer-embed-${{ matrix.target }}.zip

      - name: Upload agent-analyzer artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-analyzer-${{ matrix.target }}
          path: |
            agent-analyzer-${{ matrix.target }}.*
          if-no-files-found: error

      - name: Upload agent-analyzer-embed artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-analyzer-embed-${{ matrix.target }}
          path: |
            agent-analyzer-embed-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release $VERSION" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.notes.outputs.version }}
          body_path: release_notes.md
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
